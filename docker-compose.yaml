services:
  postgres:
    image: postgres:15
    container_name: creator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-creator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-creator_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-creator}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - creator_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-creator}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: creator-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - creator_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: creator-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-creator}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-creator_dev_pw}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - creator_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: creator-kokoro
    restart: unless-stopped
    ports:
      - "${KOKORO_PORT:-8880}:8880"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8880/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: creator-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - creator_qdrant_data:/qdrant/storage

volumes:
  creator_postgres_data:
  creator_redis_data:
  creator_minio_data:
  creator_qdrant_data:
