name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://creator:creator_dev_pw@localhost:5434/creator
      REDIS_URL: redis://localhost:6379
      LLM_PROVIDER: groq
      VOICE_PROVIDER: kokoro
      STORAGE_PROVIDER: minio
      MODERATION_PROVIDER: stub
      MEDIA_SEARCH_PROVIDER: stub
      CAPTION_PROVIDER: stub
      RENDERER_PROVIDER: stub
      EXPORTER_PROVIDER: stub
      GROQ_API_KEY: ci-placeholder
      GROQ_MODEL: llama-3.3-70b-versatile
      KOKORO_URL: http://localhost:8880
      KOKORO_VOICE: af_heart
      MINIO_ENDPOINT: localhost
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: creator
      MINIO_SECRET_KEY: creator_dev_pw
      MINIO_BUCKET: creator-media
      MINIO_PUBLIC_URL: http://localhost:9000
      AUTH_SECRET: ci-placeholder-secret
      APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
